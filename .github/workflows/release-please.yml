name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # RELEASE_PAT is a fine-grained PAT owned by a repo admin, so the tag
          # push from a merged Release PR triggers downstream workflows (release.yml).
          # GITHUB_TOKEN pushes do NOT trigger other workflows — do not swap it back.
          token: ${{ secrets.RELEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
