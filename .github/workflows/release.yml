name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write       # create GitHub releases, tag, and push cask branch
  pull-requests: write  # open the Homebrew cask bump PR
  packages: write

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history required for changelog

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Passed through to .goreleaser.yaml for the Homebrew cask PR.
          # GITHUB_TOKEN-authored PRs don't trigger workflows, so the required
          # CI and PR Title checks would never report. RELEASE_PAT is a
          # human-owned token, so its PRs trigger those workflows normally.
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}

      # GoReleaser opens a PR on brew/confluence-mcp-<tag> to bump Casks/.
      # Nothing human needs reviewing — just queue it for auto-merge so it
      # lands as soon as CI and PR Title report green.
      - name: Enable auto-merge on cask PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          set -euo pipefail
          branch="brew/confluence-mcp-${GITHUB_REF_NAME}"
          pr=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')
          if [ -z "$pr" ]; then
            echo "No open cask PR on $branch — skipping."
            exit 0
          fi
          echo "Enabling auto-merge on PR #$pr ($branch)"
          gh pr merge "$pr" --auto --squash
